- name: Adding Application User
  ansible.builtin.user:
    name: roboshop


- name: Remove old content
  ansible.builtin.file:
    path: "{{ app_path }}"
    state: absent


- name: Create App Directory
  ansiblie.builtin.file:
    path: "{{ app_path }}"
    state: directory



- name: Download Application Content
  ansible.builtin.get.url:
    url: https://roboshop-artifacts.s3.amazonaws.com/${component}-v3.zip
    dest: /tmp/{{component}}.zip


- name: download & Extract Application Content
  ansible.builtin.unarchive:
    src: https://roboshop-artifacts.s3.amazonaws.com/${component}-v3.zip
    dest: "{{ app_path }}"
    remote_src: yes

